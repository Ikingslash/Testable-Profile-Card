<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

        <article data-testid="test-profile-card" class="card">

            <!-- header -->
            <header class="card-header">

                <figure class="user-avatar">
                    <img data-testid="test-user-avatar"
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlGWqDKcRdtZz9G077xSQ_nk-4ucejdpd7JA&s"
                        alt="Profile avatar of David Gbemudu">
                </figure>

                <div class="user-info">
                    <h2 data-testid="test-user-name" id="user-name">
                        David Gbemudu
                    </h2>
                </div>

            </header>

            <!-- BIO -->
            <p data-testid="test-user-bio" class="profile-bio" id="biography">
                Hi, I'm David Gbemudu, a software engineer with a passion for building innovative and user-friendly
                applications.
            </p>

            <!-- TIME -->
            <time data-testid="test-user-time" id="user-time"></time>

            <!-- SOCIAL LINKS -->
            <nav data-testid="test-user-social-links" class="social-links">
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"
                    data-testid="test-user-social-twitter">
                    Twitter
                </a>

                <a href="https://github.com" target="_blank" rel="noopener noreferrer"
                    data-testid="test-user-social-github">
                    GitHub
                </a>
            </nav>

            <!-- HOBBIES -->
            <section>
                <h3>Hobbies</h3>
                <ul data-testid="test-user-hobbies" class="profile-hobbies">
                    <li>Listening to Music</li>
                    <li>Watching Football</li>
                </ul>
            </section>

            <!-- DISLIKES -->
            <section>
                <h3>Dislikes</h3>
                <ul data-testid="test-user-dislikes" class="profile-dislikes">
                    <li>Dishonest People</li>
                    <li>Spaghetti</li>
                </ul>
            </section>

        </article>

    </main>

    <script src="script.js"></script>
</body>

</html>
